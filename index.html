<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Крипто-биржа</title>
<style>
  :root {
    --bg: #f4f5f7;
    --card-bg: #ffffff;
    --text: #1c1c1e;
    --text-secondary: #9a9ea5;
    --shadow: rgba(0,0,0,0.06);
    --nav-shadow: rgba(0,0,0,0.08);
    --skeleton-base: #eee;
    --skeleton-shine: #f5f5f5;
    --border: rgba(0,0,0,0.05);
  }
  [data-theme="dark"] {
    --bg: #111214;
    --card-bg: #1c1e21;
    --text: #f0f0f0;
    --text-secondary: #85898f;
    --shadow: rgba(0,0,0,0.3);
    --nav-shadow: rgba(0,0,0,0.4);
    --skeleton-base: #262830;
    --skeleton-shine: #32353d;
    --border: rgba(255,255,255,0.06);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow-x: hidden;
    transition: background 0.3s ease, color 0.3s ease;
  }
  #app { padding: 16px 16px 90px; min-height: 100vh; }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .tab-title { font-size: 20px; font-weight: 700; }
  .theme-btn {
    background: var(--card-bg);
    border: none;
    border-radius: 12px;
    width: 38px; height: 38px;
    font-size: 18px;
    cursor: pointer;
    box-shadow: 0 2px 8px var(--shadow);
    transition: transform 0.25s ease;
  }
  .theme-btn:active { transform: rotate(20deg) scale(0.9); }

  .search-box {
    display: flex;
    align-items: center;
    background: var(--card-bg);
    border-radius: 14px;
    padding: 10px 14px;
    box-shadow: 0 2px 8px var(--shadow);
    margin-bottom: 14px;
  }
  .search-box input {
    border: none;
    outline: none;
    font-size: 15px;
    flex: 1;
    margin-left: 8px;
    background: transparent;
    color: var(--text);
  }

  .coin-card {
    background: var(--card-bg);
    border-radius: 16px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 8px var(--shadow);
    margin-bottom: 10px;
    animation: slideIn 0.35s ease;
    cursor: pointer;
    transition: transform 0.15s ease, background 0.3s ease;
  }
  .coin-card:active { transform: scale(0.98); }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .coin-left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
  .coin-icon { width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0; object-fit: cover; background: #eee; }
  .coin-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .coin-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 110px; }
  .coin-symbol { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; }

  .coin-mid { display: flex; flex-direction: column; align-items: flex-end; margin-right: 10px; }
  .coin-price { font-size: 15px; font-weight: 700; transition: color 0.4s ease; }
  .coin-change { font-size: 11px; font-weight: 600; margin-top: 2px; }
  .up { color: #2ecc71; }
  .down { color: #e74c3c; }

  .flash-up { animation: flashUp 0.6s ease; }
  .flash-down { animation: flashDown 0.6s ease; }
  @keyframes flashUp { 0% { background: rgba(46,204,113,0.15); } 100% { background: transparent; } }
  @keyframes flashDown { 0% { background: rgba(231,76,60,0.15); } 100% { background: transparent; } }

  canvas.spark { width: 70px; height: 34px; flex-shrink: 0; }

  .star-btn {
    background: none; border: none; font-size: 18px; cursor: pointer;
    margin-left: 8px; transition: transform 0.2s ease; flex-shrink: 0;
  }
  .star-btn:active { transform: scale(1.4); }
  .star-active { color: #f1c40f; }
  .star-inactive { color: #d3d5d8; }

  .empty-state { text-align: center; color: var(--text-secondary); font-size: 14px; padding: 60px 20px; }

  .skeleton {
    background: linear-gradient(90deg, var(--skeleton-base) 25%, var(--skeleton-shine) 50%, var(--skeleton-base) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 16px;
    height: 66px;
    margin-bottom: 10px;
  }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--card-bg);
    display: flex;
    box-shadow: 0 -2px 12px var(--nav-shadow);
    padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
    z-index: 10;
    transition: background 0.3s ease;
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
    background: none; border: none; font-size: 11px; color: #b0b3b8; cursor: pointer;
    transition: color 0.2s ease, transform 0.2s ease;
  }
  .nav-btn.active { color: #2d7ff9; transform: translateY(-2px); }
  .nav-icon { font-size: 21px; }

  .section { display: none; }
  .section.visible { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* ===== экран деталей монеты ===== */
  #detail-screen {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--bg);
    z-index: 20;
    padding: 16px;
    display: none;
    overflow-y: auto;
    animation: slideUp 0.3s ease;
  }
  #detail-screen.visible { display: block; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  .back-btn {
    background: var(--card-bg);
    border: none;
    border-radius: 12px;
    width: 38px; height: 38px;
    font-size: 18px;
    cursor: pointer;
    box-shadow: 0 2px 8px var(--shadow);
    margin-bottom: 16px;
  }

  .detail-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .detail-icon { width: 48px; height: 48px; border-radius: 50%; }
  .detail-name { font-size: 20px; font-weight: 700; }
  .detail-symbol { font-size: 13px; color: var(--text-secondary); text-transform: uppercase; }

  .detail-price { font-size: 34px; font-weight: 800; margin-bottom: 4px; }
  .detail-change { font-size: 15px; font-weight: 600; margin-bottom: 20px; }

  .detail-chart-box {
    background: var(--card-bg);
    border-radius: 16px;
    padding: 16px;
    box-shadow: 0 2px 8px var(--shadow);
    margin-bottom: 16px;
  }
  #detail-canvas { width: 100%; height: 160px; display: block; }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .stat-card {
    background: var(--card-bg);
    border-radius: 14px;
    padding: 12px 14px;
    box-shadow: 0 2px 8px var(--shadow);
  }
  .stat-label { font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; }
  .stat-value { font-size: 15px; font-weight: 700; }
</style>
</head>
<body>

<div id="app">
  <div class="top-bar">
    <div class="tab-title" id="page-title">Рынок</div>
    <button class="theme-btn" id="theme-toggle">🌙</button>
  </div>

  <div class="section visible" id="section-market">
    <div class="search-box">
      <span>🔍</span>
      <input type="text" id="search-input" placeholder="Найти криптовалюту...">
    </div>
    <div id="market-list"></div>
  </div>

  <div class="section" id="section-favorites">
    <div id="favorites-list"></div>
  </div>
</div>

<div class="bottom-nav" id="bottom-nav">
  <button class="nav-btn active" data-tab="market">
    <span class="nav-icon">📊</span>
    Рынок
  </button>
  <button class="nav-btn" data-tab="favorites">
    <span class="nav-icon">⭐</span>
    Избранное
  </button>
</div>

<!-- экран деталей монеты -->
<div id="detail-screen">
  <button class="back-btn" id="back-btn">←</button>
  <div class="detail-header">
    <img class="detail-icon" id="detail-icon" src="" alt="">
    <div>
      <div class="detail-name" id="detail-name"></div>
      <div class="detail-symbol" id="detail-symbol"></div>
    </div>
  </div>
  <div class="detail-price" id="detail-price"></div>
  <div class="detail-change" id="detail-change"></div>

  <div class="detail-chart-box">
    <canvas id="detail-canvas" width="600" height="320"></canvas>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Рыночная капитализация</div>
      <div class="stat-value" id="stat-marketcap">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Объём за 24ч</div>
      <div class="stat-value" id="stat-volume">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Максимум за 24ч</div>
      <div class="stat-value" id="stat-high">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Минимум за 24ч</div>
      <div class="stat-value" id="stat-low">—</div>
    </div>
  </div>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();

  const MAX_POINTS = 30;
  const REFRESH_MS = 15000;

  let coins = [];
  let history = {};
  let favorites = new Set(JSON.parse(localStorage.getItem("fav_coins") || "[]"));
  let searchQuery = "";
  let currentTab = "market";
  let openCoinId = null;
  let lastPrices = {};

  // ===== тема =====
  function applyTheme(theme) {
    document.documentElement.setAttribute("data-theme", theme);
    document.getElementById("theme-toggle").textContent = theme === "dark" ? "☀️" : "🌙";
    localStorage.setItem("theme", theme);
  }
  const savedTheme = localStorage.getItem("theme") || "light";
  applyTheme(savedTheme);

  document.getElementById("theme-toggle").addEventListener("click", () => {
    const current = document.documentElement.getAttribute("data-theme") || "light";
    applyTheme(current === "dark" ? "light" : "dark");
  });

  // ===== данные =====
  async function fetchMarket() {
    try {
      const res = await fetch(
        "https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=100&page=1&price_change_percentage=24h"
      );
      const data = await res.json();
      coins = data;

      data.forEach(c => {
        if (!history[c.id]) history[c.id] = [];
        const arr = history[c.id];
        arr.push(c.current_price);
        if (arr.length > MAX_POINTS) arr.shift();
      });

      renderAll();
      if (openCoinId) renderDetail(openCoinId);
    } catch (e) {
      console.error("Ошибка загрузки рынка:", e);
    }
  }

  function formatPrice(p) {
    if (p >= 1) return "$" + p.toLocaleString("en-US", { maximumFractionDigits: 2 });
    return "$" + p.toLocaleString("en-US", { maximumFractionDigits: 6 });
  }

  function formatBig(n) {
    if (n >= 1e9) return "$" + (n / 1e9).toFixed(2) + " млрд";
    if (n >= 1e6) return "$" + (n / 1e6).toFixed(2) + " млн";
    return "$" + n.toLocaleString("en-US");
  }

  function drawSpark(canvas, prices, isUp) {
    const ctx = canvas.getContext("2d");
    const w = canvas.width, h = canvas.height;
    ctx.clearRect(0, 0, w, h);
    if (prices.length < 2) return;

    const min = Math.min(...prices);
    const max = Math.max(...prices);
    const range = max - min || 1;
    const color = isUp ? "#2ecc71" : "#e74c3c";

    const points = prices.map((p, i) => [
      (i / (prices.length - 1)) * w,
      h - ((p - min) / range) * (h - 6) - 3
    ]);

    ctx.beginPath();
    points.forEach(([x, y], i) => i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y));
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.lineJoin = "round";
    ctx.stroke();
  }

  function drawDetailChart(prices, isUp) {
    const canvas = document.getElementById("detail-canvas");
    const ctx = canvas.getContext("2d");
    const w = canvas.width, h = canvas.height;
    ctx.clearRect(0, 0, w, h);
    if (prices.length < 2) return;

    const min = Math.min(...prices);
    const max = Math.max(...prices);
    const range = max - min || 1;
    const color = isUp ? "#2ecc71" : "#e74c3c";

    const points = prices.map((p, i) => [
      (i / (prices.length - 1)) * w,
      h - ((p - min) / range) * (h - 20) - 10
    ]);

    ctx.beginPath();
    ctx.moveTo(points[0][0], h);
    points.forEach(([x, y]) => ctx.lineTo(x, y));
    ctx.lineTo(points[points.length - 1][0], h);
    ctx.closePath();
    const gradient = ctx.createLinearGradient(0, 0, 0, h);
    gradient.addColorStop(0, color + "33");
    gradient.addColorStop(1, color + "00");
    ctx.fillStyle = gradient;
    ctx.fill();

    ctx.beginPath();
    points.forEach(([x, y], i) => i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y));
    ctx.strokeStyle = color;
    ctx.lineWidth = 3;
    ctx.lineJoin = "round";
    ctx.stroke();
  }

  function buildCard(coin, prevPriceMap) {
    const arr = history[coin.id] || [coin.current_price];
    const first = arr[0];
    const last = arr[arr.length - 1];
    const localChange = arr.length > 1 ? ((last - first) / first) * 100 : 0;
    const isUp = localChange >= 0;

    const prevPrice = prevPriceMap[coin.id];
    let flashClass = "";
    if (prevPrice !== undefined) {
      if (coin.current_price > prevPrice) flashClass = "flash-up";
      else if (coin.current_price < prevPrice) flashClass = "flash-down";
    }

    const isFav = favorites.has(coin.id);
    const card = document.createElement("div");
    card.className = "coin-card " + flashClass;

    card.innerHTML = `
      <div class="coin-left">
        <img class="coin-icon" src="${coin.image}" alt="">
        <div class="coin-info">
          <div class="coin-name">${coin.name}</div>
          <div class="coin-symbol">${coin.symbol}</div>
        </div>
      </div>
      <div class="coin-mid">
        <div class="coin-price">${formatPrice(coin.current_price)}</div>
        <div class="coin-change ${isUp ? 'up' : 'down'}">${isUp ? '▲' : '▼'} ${Math.abs(localChange).toFixed(2)}%</div>
      </div>
      <canvas class="spark" width="140" height="68"></canvas>
      <button class="star-btn ${isFav ? 'star-active' : 'star-inactive'}" data-id="${coin.id}">
        ${isFav ? '★' : '☆'}
      </button>
    `;

    const canvas = card.querySelector("canvas");
    requestAnimationFrame(() => drawSpark(canvas, arr, isUp));

    card.querySelector(".star-btn").addEventListener("click", (e) => {
      e.stopPropagation();
      const id = e.currentTarget.dataset.id;
      if (favorites.has(id)) favorites.delete(id);
      else favorites.add(id);
      saveFavorites();
      renderAll();
    });

    card.addEventListener("click", () => openDetail(coin.id));

    return card;
  }

  function saveFavorites() {
    localStorage.setItem("fav_coins", JSON.stringify([...favorites]));
  }

  function renderAll() {
    const prevPriceMap = lastPrices;
    lastPrices = {};
    coins.forEach(c => lastPrices[c.id] = c.current_price);

    const marketList = document.getElementById("market-list");
    marketList.innerHTML = "";
    const filtered = coins.filter(c =>
      c.name.toLowerCase().includes(searchQuery) ||
      c.symbol.toLowerCase().includes(searchQuery)
    );
    if (filtered.length === 0) {
      marketList.innerHTML = `<div class="empty-state">Ничего не найдено 🔍</div>`;
    } else {
      filtered.forEach(coin => marketList.appendChild(buildCard(coin, prevPriceMap)));
    }

    const favList = document.getElementById("favorites-list");
    favList.innerHTML = "";
    const favCoins = coins.filter(c => favorites.has(c.id));
    if (favCoins.length === 0) {
      favList.innerHTML = `<div class="empty-state">Пока пусто ⭐<br>Добавьте монеты со вкладки «Рынок»</div>`;
    } else {
      favCoins.forEach(coin => favList.appendChild(buildCard(coin, prevPriceMap)));
    }
  }

  // ===== экран деталей =====
  function openDetail(coinId) {
    openCoinId = coinId;
    renderDetail(coinId);
    document.getElementById("detail-screen").classList.add("visible");
    document.getElementById("bottom-nav").style.display = "none";
  }

  function closeDetail() {
    openCoinId = null;
    document.getElementById("detail-screen").classList.remove("visible");
    document.getElementById("bottom-nav").style.display = "flex";
  }

  function renderDetail(coinId) {
    const coin = coins.find(c => c.id === coinId);
    if (!coin) return;

    const arr = history[coin.id] || [coin.current_price];
    const first = arr[0];
    const last = arr[arr.length - 1];
    const localChange = arr.length > 1 ? ((last - first) / first) * 100 : 0;
    const isUp = localChange >= 0;

    document.getElementById("detail-icon").src = coin.image;
    document.getElementById("detail-name").textContent = coin.name;
    document.getElementById("detail-symbol").textContent = coin.symbol;
    document.getElementById("detail-price").textContent = formatPrice(coin.current_price);

    const changeEl = document.getElementById("detail-change");
    changeEl.textContent = (isUp ? "▲ " : "▼ ") + Math.abs(localChange).toFixed(2) + "% за сессию";
    changeEl.className = "detail-change " + (isUp ? "up" : "down");

    document.getElementById("stat-marketcap").textContent = formatBig(coin.market_cap);
    document.getElementById("stat-volume").textContent = formatBig(coin.total_volume);
    document.getElementById("stat-high").textContent = formatPrice(coin.high_24h);
    document.getElementById("stat-low").textContent = formatPrice(coin.low_24h);

    drawDetailChart(arr, isUp);
  }

  document.getElementById("back-btn").addEventListener("click", closeDetail);

  // ===== поиск =====
  document.getElementById("search-input").addEventListener("input", (e) => {
    searchQuery = e.target.value.trim().toLowerCase();
    renderAll();
  });

  // ===== навигация =====
  document.querySelectorAll(".nav-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentTab = btn.dataset.tab;
      document.getElementById("section-market").classList.toggle("visible", currentTab === "market");
      document.getElementById("section-favorites").classList.toggle("visible", currentTab === "favorites");
      document.getElementById("page-title").textContent = currentTab === "market" ? "Рынок" : "Избранное";
    });
  });

  // ===== начальная загрузка =====
  function showSkeletons() {
    const marketList = document.getElementById("market-list");
    marketList.innerHTML = "";
    for (let i = 0; i < 6; i++) {
      const sk = document.createElement("div");
      sk.className = "skeleton";
      marketList.appendChild(sk);
    }
  }

  showSkeletons();
  fetchMarket();
  setInterval(fetchMarket, REFRESH_MS);
</script>
</body>
</html>
