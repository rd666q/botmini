<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Крипто-курсы</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Segoe UI", sans-serif;
    background: #f4f5f7;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .card {
    background: #ffffff;
    border-radius: 16px;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    transition: box-shadow 0.3s ease;
  }
  .info { display: flex; flex-direction: column; gap: 4px; }
  .label { font-size: 13px; color: #8b8f97; font-weight: 500; display: flex; align-items: center; gap: 6px; }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #2ecc71;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0% { opacity: 1; }
    50% { opacity: 0.3; }
    100% { opacity: 1; }
  }
  .price { font-size: 22px; font-weight: 700; color: #1c1c1e; transition: color 0.3s ease; }
  .change { font-size: 12px; font-weight: 600; }
  .up { color: #2ecc71; }
  .down { color: #e74c3c; }
  canvas { width: 130px; height: 50px; }
</style>
</head>
<body>

  <div class="card" id="btc-card">
    <div class="info">
      <div class="label"><span class="dot"></span>Bitcoin</div>
      <div class="price" id="btc-price">...</div>
      <div class="change" id="btc-change"></div>
    </div>
    <canvas id="btc-chart" width="260" height="100"></canvas>
  </div>

  <div class="card" id="ton-card">
    <div class="info">
      <div class="label"><span class="dot"></span>TON</div>
      <div class="price" id="ton-price">...</div>
      <div class="change" id="ton-change"></div>
    </div>
    <canvas id="ton-chart" width="260" height="100"></canvas>
  </div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const MAX_POINTS = 40; // сколько последних точек храним и показываем
    const history = {
      bitcoin: [],
      "the-open-network": []
    };

    async function fetchPrice(coinId) {
      const res = await fetch(
        `https://api.coingecko.com/api/v3/simple/price?ids=${coinId}&vs_currencies=usd`
      );
      const data = await res.json();
      return data[coinId].usd;
    }

    async function updateCoin(coinId, priceElId, changeElId, canvasId) {
      try {
        const price = await fetchPrice(coinId);

        const arr = history[coinId];
        arr.push(price);
        if (arr.length > MAX_POINTS) arr.shift();

        const first = arr[0];
        const last = arr[arr.length - 1];
        const change = arr.length > 1 ? ((last - first) / first) * 100 : 0;
        const isUp = change >= 0;

        document.getElementById(priceElId).textContent =
          "$" + last.toLocaleString("en-US", { maximumFractionDigits: last < 10 ? 4 : 0 });

        const changeEl = document.getElementById(changeElId);
        changeEl.textContent = (isUp ? "▲ " : "▼ ") + Math.abs(change).toFixed(3) + "%";
        changeEl.className = "change " + (isUp ? "up" : "down");

        drawChart(canvasId, arr, isUp);
      } catch (e) {
        console.error(e);
      }
    }

    function drawChart(canvasId, prices, isUp) {
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext("2d");
      const w = canvas.width;
      const h = canvas.height;
      ctx.clearRect(0, 0, w, h);

      if (prices.length < 2) return;

      const min = Math.min(...prices);
      const max = Math.max(...prices);
      const range = max - min || 1;

      const color = isUp ? "#2ecc71" : "#e74c3c";
      const points = prices.map((p, i) => {
        const x = (i / (prices.length - 1)) * w;
        const y = h - ((p - min) / range) * (h - 10) - 5;
        return [x, y];
      });

      ctx.beginPath();
      ctx.moveTo(points[0][0], h);
      points.forEach(([x, y]) => ctx.lineTo(x, y));
      ctx.lineTo(points[points.length - 1][0], h);
      ctx.closePath();
      const gradient = ctx.createLinearGradient(0, 0, 0, h);
      gradient.addColorStop(0, color + "33");
      gradient.addColorStop(1, color + "00");
      ctx.fillStyle = gradient;
      ctx.fill();

      ctx.beginPath();
      points.forEach(([x, y], i) => {
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    function updateAll() {
      updateCoin("bitcoin", "btc-price", "btc-change", "btc-chart");
      updateCoin("the-open-network", "ton-price", "ton-change", "ton-chart");
    }

    updateAll();
    setInterval(updateAll, 15000);
  </script>
</body>
</html>
